<!DOCTYPE html>
<html>
<head>
    <title>Scenexe3.io - Fixed Version</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; background: #111; }
        
        /* Menu Screen */
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .menu-btn { background: #333; color: white; border: 2px solid #555; padding: 15px 40px; margin: 10px; cursor: pointer; font-size: 20px; border-radius: 8px; width: 300px; transition: 0.2s; }
        .menu-btn:hover { background: #00adef; border-color: #fff; }

        /* UI Elements */
        #ui-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 500px; text-align: center; pointer-events: none; }
        .xp-bar { width: 100%; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 4px; overflow: hidden; }
        #xp-fill { width: 0%; height: 100%; background: #00adef; }
        #stats-text { color: white; font-weight: bold; font-size: 22px; margin-top: 10px; text-shadow: 2px 2px 4px #000; }
        
        #top-display { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 30px; border: 2px solid #00adef; color: white; font-size: 20px; font-weight: bold; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="menu-overlay">
        <h1 style="color:white; font-size: 50px; margin-bottom: 20px;">SCENEXE3</h1>
        <button class="menu-btn" onclick="startGame('FFA', 'Basic')">PLAY FFA (Basic)</button>
        <button class="menu-btn" onclick="startGame('FFA', 'Sniper')">PLAY FFA (Sniper)</button>
        <button class="menu-btn" onclick="startGame('Team2', 'Basic')">PLAY TEAM 2</button>
    </div>

    <div id="top-display">
        <span id="mode-text">FFA</span><br>
        <span id="class-text" style="font-size: 14px; color: #aaa;">Class: None</span>
    </div>

    <div id="ui-container">
        <div class="xp-bar"><div id="xp-fill"></div></div>
        <div id="stats-text">LVL <span id="lvl">1</span> | SCORE <span id="score">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let gameActive = false;
        let currentFOV = 1;
        let arenaSize = 3000;

        let player = {
            x: 0, y: 0, angle: 0,
            lvl: 1, score: 0, xp: 0, nextLvl: 100,
            speed: 5, size: 25, color: '#00adef', type: 'Basic',
            cooldown: 0
        };

        let keys = {};
        let bullets = [];
        let shapes = [];
        let portals = [];

        // Shapes Data from your screenshot
        const SHAPES_LIST = [
            { sides: 3, color: '#ffe869', size: 20, hp: 10, xp: 10, name: 'Triangle' },
            { sides: 4, color: '#ff8a8a', size: 22, hp: 20, xp: 20, name: 'Square' },
            { sides: 5, color: '#768dfc', size: 35, hp: 50, xp: 50, name: 'Pentagon' },
            { sides: 11, color: '#11152b', size: 150, hp: 5000, xp: 2000, name: 'Hendecagon' },
            { sides: 3, color: '#555', size: 1000, hp: 50000, xp: 10000, isBoss: true, name: 'Tetrahedron' }
        ];

        function startGame(mode, type) {
            document.getElementById('menu-overlay').style.display = 'none';
            player.type = type;
            document.getElementById('class-text').innerText = "Class: " + type;
            document.getElementById('mode-text').innerText = mode;
            
            // Spawn initial shapes
            for(let i=0; i<200; i++) {
                spawnRandomShape();
            }
            
            gameActive = true;
        }

        function spawnRandomShape() {
            let r = Math.random();
            let data = SHAPES_LIST[0];
            if(r > 0.99) data = SHAPES_LIST[4];
            else if(r > 0.95) data = SHAPES_LIST[3];
            else if(r > 0.8) data = SHAPES_LIST[2];
            else if(r > 0.5) data = SHAPES_LIST[1];

            shapes.push({
                x: (Math.random() - 0.5) * arenaSize * 1.8,
                y: (Math.random() - 0.5) * arenaSize * 1.8,
                angle: Math.random() * Math.PI,
                spin: 0.01 + Math.random() * 0.02,
                ...data,
                maxHp: data.hp
            });
        }

        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousemove', (e) => {
            player.angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
        });
        window.addEventListener('mousedown', () => { player.shooting = true; });
        window.addEventListener('mouseup', () => { player.shooting = false; });

        function update() {
            if(!gameActive) return;

            // Movement
            if(keys['w']) player.y -= player.speed;
            if(keys['s']) player.y += player.speed;
            if(keys['a']) player.x -= player.speed;
            if(keys['d']) player.x += player.speed;

            // FOV Logic (Zoom out as you level up)
            let baseFOV = (player.type === 'Sniper') ? 0.7 : 0.9;
            let targetFOV = baseFOV / (1 + (player.lvl * 0.01));
            currentFOV += (targetFOV - currentFOV) * 0.05;

            // Shooting
            if(player.shooting && player.cooldown <= 0) {
                bullets.push({
                    x: player.x, y: player.y, 
                    angle: player.angle, speed: 12, life: 60
                });
                player.cooldown = (player.type === 'Sniper') ? 30 : 10;
            }
            if(player.cooldown > 0) player.cooldown--;

            // Bullets movement & collision
            bullets.forEach((b, bi) => {
                b.x += Math.cos(b.angle) * b.speed;
                b.y += Math.sin(b.angle) * b.speed;
                b.life--;
                
                shapes.forEach((s, si) => {
                    if(Math.hypot(b.x - s.x, b.y - s.y) < s.size) {
                        s.hp -= 10;
                        b.life = 0;
                        if(s.hp <= 0) {
                            player.score += s.xp;
                            player.xp += s.xp;
                            shapes.splice(si, 1);
                            spawnRandomShape();
                            checkLevel();
                        }
                    }
                });
                if(b.life <= 0) bullets.splice(bi, 1);
            });

            shapes.forEach(s => s.angle += s.spin);
        }

        function checkLevel() {
            if(player.xp >= player.nextLvl) {
                player.lvl++;
                player.xp = 0;
                player.nextLvl = Math.floor(player.nextLvl * 1.3);
                document.getElementById('lvl').innerText = player.lvl;
            }
            document.getElementById('score').innerText = player.score;
            document.getElementById('xp-fill').style.width = (player.xp / player.nextLvl * 100) + "%";
        }

        function drawPolygon(x, y, radius, sides, angle, color) {
            ctx.fillStyle = color;
            ctx.strokeStyle = '#333';
            ctx.lineWidth = radius/10 + 2;
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                let a = angle + (i * Math.PI * 2) / sides;
                ctx.lineTo(x + Math.cos(a) * radius, y + Math.sin(a) * radius);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(!gameActive) return;

            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(currentFOV, currentFOV);
            ctx.translate(-player.x, -player.y);

            // Arena & Grid
            ctx.fillStyle = '#222';
            ctx.fillRect(-arenaSize, -arenaSize, arenaSize*2, arenaSize*2);
            ctx.strokeStyle = '#333';
            for(let i=-arenaSize; i<=arenaSize; i+=100) {
                ctx.beginPath(); ctx.moveTo(i, -arenaSize); ctx.lineTo(i, arenaSize); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-arenaSize, i); ctx.lineTo(arenaSize, i); ctx.stroke();
            }

            // Draw Shapes
            shapes.forEach(s => {
                drawPolygon(s.x, s.y, s.size, s.sides, s.angle, s.color);
            });

            // Draw Bullets
            ctx.fillStyle = player.color;
            bullets.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, 10, 0, Math.PI*2); ctx.fill();
            });

            // Draw Player
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#999';
            let bLen = (player.type === 'Sniper') ? 60 : 40;
            ctx.fillRect(0, -12, bLen, 24);
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(0, 0, player.size, 0, Math.PI*2); ctx.fill();
            ctx.stroke();
            ctx.restore();

            ctx.restore();
            
            update();
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
