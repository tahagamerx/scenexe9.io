<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scenexe2 | Lobby & Collision Fix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap');
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Ubuntu', sans-serif; color: white; user-select: none; }
        canvas { display: none; background: #fff; }

        /* Lobby Styles */
        #lobby {
            position: absolute; width: 100%; height: 100%; 
            background: radial-gradient(circle, #2c3e50, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .lobby-box {
            background: rgba(0, 0, 0, 0.8); padding: 40px; border-radius: 20px;
            border: 4px solid #00adef; text-align: center; width: 350px;
            box-shadow: 0 0 30px rgba(0, 173, 239, 0.4);
        }
        h1 { font-size: 45px; margin-bottom: 20px; color: #00adef; text-transform: uppercase; letter-spacing: 5px; }
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none;
            background: #222; color: white; font-family: 'Ubuntu'; font-size: 16px; outline: none;
        }
        #play-btn {
            width: 100%; padding: 15px; margin-top: 20px; border-radius: 10px; border: none;
            background: #00adef; color: white; font-weight: bold; font-size: 20px;
            cursor: pointer; transition: 0.2s;
        }
        #play-btn:hover { background: #0081b3; transform: scale(1.05); }

        /* HUD Styles */
        .ui-panel { 
            position: absolute; bottom: 25px; width: 260px; z-index: 100; 
            display: none; transition: 0.3s;
        }
        .ui-visible { display: block; opacity: 1; }
        #left-ui { left: 25px; }
        #right-ui { right: 25px; }
        .stat-bar { 
            background: rgba(0, 0, 0, 0.9); border: 2px solid #333; border-radius: 30px;
            margin: 6px 0; padding: 10px 15px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; color: white;
        }
        .stat-bar:hover { border-color: #00adef; }
        .stat-val { color: #00adef; font-weight: 900; }

        #hud {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; display: none;
        }
        .xp-bar { width: 400px; height: 12px; background: #333; border: 2px solid #000; border-radius: 10px; overflow: hidden; }
        #xp-fill { width: 0%; height: 100%; background: #00adef; }
        #top-info { position: absolute; top: 20px; right: 20px; font-size: 14px; text-align: right; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>SCENEXE 2</h1>
        <div class="lobby-box">
            <input type="text" id="playerName" placeholder="Enter Name..." maxlength="15">
            <select id="region">
                <option value="asia">Asia (Lahore)</option>
                <option value="eu">Europe</option>
                <option value="us">US East</option>
            </select>
            <select id="mode">
                <option value="ffa">Free For All</option>
            </select>
            <button id="play-btn">PLAY</button>
        </div>
    </div>

    <div id="top-info">
        AUTO-FIRE [E]: <span id="e-stat">OFF</span> | SPIN [C]: <span id="c-stat">OFF</span>
    </div>

    <div id="left-ui" class="ui-panel">
        <div class="stat-bar" onclick="lvlUp('reload')"><span>[1] Reload</span><span class="stat-val" id="val-reload">0</span></div>
        <div class="stat-bar" onclick="lvlUp('damage')"><span>[2] Damage</span><span class="stat-val" id="val-damage">0</span></div>
        <div class="stat-bar" onclick="lvlUp('bSpeed')"><span>[3] B.Speed</span><span class="stat-val" id="val-bSpeed">0</span></div>
    </div>

    <div id="right-ui" class="ui-panel">
        <div class="stat-bar" onclick="lvlUp('maxHP')"><span class="stat-val" id="val-maxHP">0</span><span>Max HP [5]</span></div>
        <div class="stat-bar" onclick="lvlUp('speed')"><span class="stat-val" id="val-speed">0</span><span>Speed [8]</span></div>
    </div>

    <div id="hud">
        <div id="player-display-name" style="font-weight:bold; margin-bottom:5px; font-size:20px;"></div>
        <div class="xp-bar"><div id="xp-fill"></div></div>
        <div style="margin-top:5px;">LVL: <span id="ui-lvl">1</span> | PTS: <span id="ui-pts">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false;
        let shapes = [], bullets = [], keys = {};
        const MAP_SIZE = 5000;
        const MAP_HALF = 2500;

        let p = {
            x: 0, y: 0, vx: 0, vy: 0, angle: 0, name: "Unnamed",
            lvl: 1, xp: 0, next: 100, pts: 0, hp: 100, maxHP: 100,
            stats: { reload:0, damage:0, bSpeed:0, maxHP:0, speed:0 },
            radius: 25, cooldown: 0, autoF: false, autoS: false, isFiring: false
        };

        // Start Game Function
        document.getElementById('play-btn').onclick = () => {
            p.name = document.getElementById('playerName').value || "Player";
            document.getElementById('player-display-name').innerText = p.name;
            document.getElementById('lobby').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('hud').style.display = 'block';
            gameActive = true;
            init();
        };

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) spawnShape();
            requestAnimationFrame(loop);
        }

        function spawnShape() {
            let s = Math.random() > 0.5 ? 4 : 3;
            shapes.push({
                x: (Math.random()-0.5)*MAP_SIZE, y: (Math.random()-0.5)*MAP_SIZE,
                size: 25 + (s*5), hp: s*50, maxHP: s*50, xp: s*100, sides: s,
                color: s==4 ? '#ff8a8a' : '#ffe869', angle: Math.random()*6
            });
        }

        function lvlUp(s) {
            if(p.pts > 0 && p.stats[s] < 15) {
                p.stats[s]++; p.pts--;
                document.getElementById(`val-${s}`).innerText = p.stats[s] >= 15 ? "MAX" : p.stats[s];
                if(s === 'maxHP') { p.maxHP += 50; p.hp += 50; }
                updateUI();
            }
        }

        function updateUI() {
            const panels = document.querySelectorAll('.ui-panel');
            panels.forEach(pan => p.pts > 0 ? pan.classList.add('ui-visible') : pan.classList.remove('ui-visible'));
            document.getElementById('ui-pts').innerText = p.pts;
            document.getElementById('ui-lvl').innerText = p.lvl;
            document.getElementById('xp-fill').style.width = (p.xp/p.next*100) + "%";
        }

        window.onmousedown = () => p.isFiring = true;
        window.onmouseup = () => p.isFiring = false;
        window.onmousemove = e => p.angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
        window.onkeydown = e => {
            keys[e.key.toLowerCase()] = true;
            if(e.key.toLowerCase() === 'e') { 
                p.autoF = !p.autoF; 
                document.getElementById('e-stat').innerText = p.autoF ? "ON" : "OFF";
                document.getElementById('e-stat').style.color = p.autoF ? "#00adef" : "white";
            }
            const m = {'1':'reload','2':'damage','3':'bSpeed','5':'maxHP','8':'speed'};
            if(m[e.key]) lvlUp(m[e.key]);
        };
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        function update() {
            if(!gameActive) return;

            // Movement
            let spd = 0.6 + (p.stats.speed * 0.1);
            if(keys['w']) p.vy -= spd; if(keys['s']) p.vy += spd;
            if(keys['a']) p.vx -= spd; if(keys['d']) p.vx += spd;
            p.vx *= 0.9; p.vy *= 0.9; p.x += p.vx; p.y += p.vy;

            // Border
            p.x = Math.max(-MAP_HALF, Math.min(MAP_HALF, p.x));
            p.y = Math.max(-MAP_HALF, Math.min(MAP_HALF, p.y));

            // Shooting Logic (Only fire if Mouse Pressed OR Auto-fire is ON)
            if(p.cooldown <= 0 && (p.isFiring || p.autoF)) {
                bullets.push({
                    x: p.x, y: p.y, angle: p.angle, 
                    life: 100, dmg: 20 + (p.stats.damage*5),
                    v: 15 + (p.stats.bSpeed*1.5)
                });
                p.cooldown = 20 - (p.stats.reload * 1);
            }
            p.cooldown--;

            // Bullet collision
            bullets.forEach((b, bi) => {
                b.x += Math.cos(b.angle)*b.v; b.y += Math.sin(b.angle)*b.v;
                shapes.forEach((s, si) => {
                    if(Math.hypot(b.x-s.x, b.y-s.y) < s.size) {
                        s.hp -= b.dmg; b.life = 0;
                        if(s.hp <= 0) { 
                            p.xp += s.xp; shapes.splice(si, 1); spawnShape(); 
                            if(p.xp >= p.next) { p.lvl++; p.pts++; p.xp=0; p.next*=1.4; updateUI(); }
                            updateUI();
                        }
                    }
                });
                if(b.life-- <= 0) bullets.splice(bi, 1);
            });

            // Tank vs Shape SOLID COLLISION (Fix)
            shapes.forEach(s => {
                let dist = Math.hypot(p.x - s.x, p.y - s.y);
                if(dist < p.radius + s.size) {
                    let angle = Math.atan2(p.y - s.y, p.x - s.x);
                    let overlap = (p.radius + s.size) - dist;
                    p.x += Math.cos(angle) * overlap; // Push player back
                    p.y += Math.sin(angle) * overlap;
                    p.vx *= 0.5; p.vy *= 0.5; // Slow down on hit
                }
            });
        }

        function loop() {
            update();
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            ctx.save();
            ctx.translate(canvas.width/2 - p.x, canvas.height/2 - p.y);

            // Grid & Border
            ctx.strokeStyle = '#eee'; ctx.lineWidth = 2;
            for(let i=-MAP_HALF; i<=MAP_HALF; i+=100) {
                ctx.moveTo(i, -MAP_HALF); ctx.lineTo(i, MAP_HALF);
                ctx.moveTo(-MAP_HALF, i); ctx.lineTo(MAP_HALF, i);
            }
            ctx.stroke();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 10;
            ctx.strokeRect(-MAP_HALF, -MAP_HALF, MAP_SIZE, MAP_SIZE);

            // Draw Shapes
            shapes.forEach(s => {
                ctx.fillStyle = s.color; ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
                ctx.beginPath();
                for(let i=0; i<s.sides; i++) ctx.lineTo(s.x+Math.cos(s.angle+i*Math.PI*2/s.sides)*s.size, s.y+Math.sin(s.angle+i*Math.PI*2/s.sides)*s.size);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                if(s.hp < s.maxHP) {
                    ctx.fillStyle = '#444'; ctx.fillRect(s.x-20, s.y+s.size+5, 40, 5);
                    ctx.fillStyle = '#f44'; ctx.fillRect(s.x-20, s.y+s.size+5, 40*(s.hp/s.maxHP), 5);
                }
            });

            // Bullets
            ctx.fillStyle = '#00adef';
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, 7); ctx.fill(); ctx.stroke(); });

            // Tank
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
            ctx.fillStyle = '#999'; ctx.strokeRect(0, -12, 45, 24); ctx.fillRect(0, -12, 45, 24);
            ctx.fillStyle = '#00adef'; ctx.beginPath(); ctx.arc(0,0,p.radius, 0, 7); ctx.fill(); ctx.stroke();
            ctx.restore();

            ctx.restore();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
