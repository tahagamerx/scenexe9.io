<!DOCTYPE html>
<html>
<head>
    <title>Scenexe Clone - Project Taha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; background-color: #2c2c2c; background-image: radial-gradient(#3a3a3a 1px, transparent 1px); background-size: 40px 40px; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        .stat { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .lvl-bar { width: 200px; height: 15px; background: #444; border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #xp-fill { width: 0%; height: 100%; background: #00adef; transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat">Level: <span id="lvl">1</span></div>
        <div class="stat">Score: <span id="score">0</span></div>
        <div class="lvl-bar"><div id="xp-fill"></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player = { x: canvas.width/2, y: canvas.height/2, angle: 0, score: 0, lvl: 1, xp: 0, nextLvl: 100, speed: 4 };
        let bullets = [];
        let shapes = [];
        let particles = [];

        function createShape() {
            const types = ['square', 'triangle', 'pentagon'];
            const type = types[Math.floor(Math.random() * types.length)];
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                type: type,
                hp: type === 'square' ? 20 : (type === 'triangle' ? 50 : 100),
                xp: type === 'square' ? 10 : (type === 'triangle' ? 25 : 60),
                size: type === 'square' ? 20 : 25,
                angle: Math.random() * Math.PI * 2
            };
        }

        for(let i=0; i<20; i++) shapes.push(createShape());

        window.onmousemove = (e) => { player.angle = Math.atan2(e.clientY - player.y, e.clientX - player.x); };
        
        window.onclick = () => {
            bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: 10, damage: 20 + (player.lvl * 2) });
        };

        function update() {
            // Player Movement (WASD)
            // (Aap ismein keyboard movement bhi add kar saktay hain)

            bullets.forEach((b, bi) => {
                b.x += Math.cos(b.angle) * b.speed;
                b.y += Math.sin(b.angle) * b.speed;
                
                shapes.forEach((s, si) => {
                    if(Math.hypot(b.x - s.x, b.y - s.y) < s.size) {
                        s.hp -= b.damage;
                        bullets.splice(bi, 1);
                        if(s.hp <= 0) {
                            player.score += s.xp;
                            player.xp += s.xp;
                            shapes.splice(si, 1);
                            shapes.push(createShape());
                            checkLevelUp();
                        }
                    }
                });
            });
        }

        function checkLevelUp() {
            if(player.xp >= player.nextLvl) {
                player.lvl++;
                player.xp = 0;
                player.nextLvl *= 1.5;
                player.speed += 0.2;
            }
            document.getElementById('score').innerText = player.score;
            document.getElementById('lvl').innerText = player.lvl;
            document.getElementById('xp-fill').style.width = (player.xp / player.nextLvl * 100) + "%";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Shapes
            shapes.forEach(s => {
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.angle);
                ctx.fillStyle = s.type === 'square' ? '#ffe869' : (s.type === 'triangle' ? '#fc7677' : '#768dfc');
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 4;
                if(s.type === 'square') ctx.fillRect(-s.size/2, -s.size/2, s.size, s.size);
                // (Triangle aur Pentagon ki drawing logic yahan aayegi)
                ctx.strokeRect(-s.size/2, -s.size/2, s.size, s.size);
                ctx.restore();
            });

            // Draw Bullets
            bullets.forEach(b => {
                ctx.fillStyle = '#00adef';
                ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
            });

            // Draw Player
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#999'; ctx.fillRect(10, -10, 30, 20); // Advanced Barrel
            ctx.fillStyle = '#00adef'; ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fill(); 
            ctx.strokeStyle = '#0083b5'; ctx.lineWidth = 5; ctx.stroke();
            ctx.restore();

            requestAnimationFrame(() => { update(); draw(); });
        }
        draw();
    </script>
</body>
</html>
