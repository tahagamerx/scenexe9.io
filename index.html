<!DOCTYPE html>
<html>
<head>
    <title>Scenexe Clone - Ultra Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; cursor: crosshair; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: white; pointer-events: none; text-align: center; width: 300px; }
        .lvl-bar { width: 100%; height: 12px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 5px; margin-top: 5px; }
        #xp-fill { width: 0%; height: 100%; background: #00adef; }
        #stats { position: absolute; top: 10px; left: 10px; color: white; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <div id="stats">Score: <span id="score">0</span> | Level: <span id="lvl">1</span></div>
    <div id="ui">
        <div class="lvl-bar"><div id="xp-fill"></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let camera = { x: 0, y: 0 };
        let player = { x: 0, y: 0, angle: 0, score: 0, xp: 0, nextLvl: 100, lvl: 1, speed: 5, size: 25 };
        let keys = {};
        let bullets = [];
        let shapes = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Generate initial shapes in a huge world
        for(let i=0; i<200; i++) {
            shapes.push({
                x: (Math.random() - 0.5) * 4000,
                y: (Math.random() - 0.5) * 4000,
                size: 20,
                color: '#ffe869',
                hp: 20
            });
        }

        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        window.onmousemove = (e) => {
            player.angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
        };
        window.onclick = () => {
            bullets.push({
                x: player.x, y: player.y,
                angle: player.angle, speed: 12, life: 60
            });
        };

        function update() {
            // Movement Logic (WASD)
            if(keys['w']) player.y -= player.speed;
            if(keys['s']) player.y += player.speed;
            if(keys['a']) player.x -= player.speed;
            if(keys['d']) player.x += player.speed;

            // Camera follows player
            camera.x = player.x - canvas.width/2;
            camera.y = player.y - canvas.height/2;

            // Bullets update
            bullets.forEach((b, i) => {
                b.x += Math.cos(b.angle) * b.speed;
                b.y += Math.sin(b.angle) * b.speed;
                b.life--;
                if(b.life <= 0) bullets.splice(i, 1);

                // Collision
                shapes.forEach((s, si) => {
                    if(Math.hypot(b.x - s.x, b.y - s.y) < s.size) {
                        s.hp -= 10;
                        bullets.splice(i, 1);
                        if(s.hp <= 0) {
                            player.score += 10;
                            player.xp += 20;
                            shapes.splice(si, 1);
                            updateUI();
                        }
                    }
                });
            });
        }

        function updateUI() {
            if(player.xp >= player.nextLvl) {
                player.lvl++;
                player.xp = 0;
                player.nextLvl += 50;
            }
            document.getElementById('score').innerText = player.score;
            document.getElementById('lvl').innerText = player.lvl;
            document.getElementById('xp-fill').style.width = (player.xp / player.nextLvl * 100) + "%";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Draw Grid (Makes it feel like real Scenexe)
            ctx.strokeStyle = '#252525';
            ctx.lineWidth = 2;
            for(let i=-2000; i<=2000; i+=50) {
                ctx.beginPath(); ctx.moveTo(i, -2000); ctx.lineTo(i, 2000); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-2000, i); ctx.lineTo(2000, i); ctx.stroke();
            }

            // Draw Shapes
            shapes.forEach(s => {
                ctx.fillStyle = s.color;
                ctx.strokeStyle = '#998a3e';
                ctx.lineWidth = 3;
                ctx.fillRect(s.x - s.size/2, s.y - s.size/2, s.size, s.size);
                ctx.strokeRect(s.x - s.size/2, s.y - s.size/2, s.size, s.size);
            });

            // Draw Bullets
            ctx.fillStyle = '#00adef';
            bullets.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, Math.PI*2); ctx.fill();
            });

            // Draw Player
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#999'; ctx.fillRect(5, -12, 35, 24); // Cannon
            ctx.fillStyle = '#00adef'; 
            ctx.beginPath(); ctx.arc(0, 0, player.size, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#0083b5'; ctx.lineWidth = 4; ctx.stroke();
            ctx.restore();

            ctx.restore();
            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
