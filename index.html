<!DOCTYPE html>
<html>
<head>
    <title>Taha's Tank Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; background: #252525; }
        #ui { position: absolute; top: 10; left: 10; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player = { x: canvas.width/2, y: canvas.height/2, angle: 0, score: 0 };
        let bullets = [];
        let enemies = [];

        // Create random shapes (Enemies)
        for(let i=0; i<15; i++) {
            enemies.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: 20 });
        }

        window.onmousemove = (e) => { player.angle = Math.atan2(e.clientY - player.y, e.clientX - player.x); };
        
        window.onclick = () => {
            bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: 7 });
        };

        function update() {
            bullets.forEach((b, bi) => {
                b.x += Math.cos(b.angle) * b.speed;
                b.y += Math.sin(b.angle) * b.speed;
                // Collision with enemies
                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        player.score += 10;
                        document.getElementById('score').innerText = player.score;
                        // Respawn enemy
                        enemies.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: 20 });
                    }
                });
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw Enemies
            ctx.fillStyle = 'yellow';
            enemies.forEach(e => {
                ctx.fillRect(e.x, e.y, e.size, e.size);
            });
            // Draw Bullets
            ctx.fillStyle = 'white';
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill(); });
            // Draw Player
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#999'; ctx.fillRect(10, -8, 25, 16); // Barrel
            ctx.fillStyle = '#00adef'; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill(); // Body
            ctx.restore();
            requestAnimationFrame(() => { update(); draw(); });
        }
        draw();
    </script>
</body>
</html>
